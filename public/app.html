<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Muro de Mensajes — Feed público de la comunidad ANTIGRAVITY">
  <title>FLORO — Muro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="grid-bg">

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo logo-sm">
        <span class="logo-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
        <span class="logo-text">FLORO</span>
      </div>
      <div class="live-badge">
        <span class="pulse-dot"></span>
        <span class="live-text">En vivo</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-email" id="user-email"></span>
      <button class="btn btn-ghost" id="btn-logout">Salir</button>
    </div>
  </nav>

  <main class="app-layout">

    <section class="feed-section">
      <div class="feed-header">
        <div>
          <h1 class="feed-title">Muro público</h1>
          <p class="feed-subtitle">Últimos 50 mensajes</p>
        </div>
        <button class="btn-icon" id="btn-refresh" aria-label="Actualizar mensajes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
      <div class="feed-list" id="feed-list"></div>
    </section>

    <aside class="sidebar">
      <div class="card composer-card">
        <h2 class="card-title">Nuevo mensaje</h2>
        <textarea id="mensaje-input" class="composer-textarea" placeholder="¿Qué quieres compartir?" maxlength="280"></textarea>
        <div class="composer-footer">
          <span class="char-counter"><span id="char-count">0</span>/280</span>
          <button class="btn btn-primary btn-sm" id="btn-publish">
            <span class="btn-text">Publicar</span>
            <span class="btn-spinner"></span>
          </button>
        </div>
      </div>

      <div class="card stats-card">
        <h2 class="card-title">Estado</h2>
        <div class="stat-row">
          <span class="stat-label">Mensajes</span>
          <span class="stat-value" id="stat-mensajes">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Plataforma</span>
          <span class="stat-value">Cloud Run</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Servidor</span>
          <span class="stat-value" id="stat-status">
            <span class="status-dot"></span> Verificando
          </span>
        </div>
      </div>
    </aside>

  </main>

  <script src="app.js"></script>
</body>
</html>
